small_version: "1.0.0"
owner: "human"
constraints:
  - id: "no-secrets"
    rule: "No secrets in source, tests, fixtures, or SMALL artifacts."
    severity: "error"
  - id: "no-prod-writes"
    rule: "No writes to production systems or remote state."
    severity: "error"
  - id: "mvp-no-manager-port"
    rule: "MVP must not bind a TCP port for manager control; use pure CLI/TUI behavior only."
    severity: "error"
  - id: "registry-source-of-truth"
    rule: "ports.yml is explicit source of truth for managed services; discovery may aid attribution only."
    severity: "error"
  - id: "kill-by-group"
    rule: "Kill flows must prefer process-group termination with timeout escalation before PID fallback."
    severity: "error"
  - id: "minimal-deps"
    rule: "Use minimal Rust dependencies aligned with requested stack; avoid adding daemon/web frameworks in MVP."
    severity: "warn"
