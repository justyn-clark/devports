name: Publish npm package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, e.g. v0.1.0"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Require NPM_TOKEN bootstrap secret
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "NPM_TOKEN secret is required for devports bootstrap publish"
            exit 1
          fi

      - name: Upgrade npm
        run: npm install -g npm@11.10.1

      - name: Verify npm package metadata matches release intent
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          PKG_VERSION="$(node -p "require('./packages/npm/package.json').version")"
          PKG_NAME="$(node -p "require('./packages/npm/package.json').name")"
          if [ "${PKG_NAME}" != "@justynclark/devports" ]; then
            echo "Expected packages/npm/package.json name to be @justynclark/devports, got ${PKG_NAME}"
            exit 1
          fi
          if [ "v${PKG_VERSION}" != "${TAG}" ]; then
            echo "Tag ${TAG} does not match packages/npm/package.json version ${PKG_VERSION}"
            exit 1
          fi

      - name: Show npm auth identity
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm whoami

      - name: Publish @justynclark/devports via npm token bootstrap
        working-directory: packages/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
