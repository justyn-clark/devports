name: Publish npm package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, e.g. v0.1.0"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm
        run: npm install -g npm@11.10.1

      - name: Verify npm package version matches tag
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          PKG_VERSION="$(node -p "require('./packages/npm/package.json').version")"
          if [ "v${PKG_VERSION}" != "${TAG}" ]; then
            echo "Tag ${TAG} does not match packages/npm/package.json version ${PKG_VERSION}"
            exit 1
          fi

      - name: Publish @justyn-clark/devports via npm Trusted Publishing (OIDC)
        working-directory: packages/npm
        run: npm publish --provenance --access public
